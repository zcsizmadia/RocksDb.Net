name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET SDKs
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x

    - name: Build
      shell: bash
      run: |
        dotnet restore
        dotnet build -c Release --no-restore

    - name: Test
      shell: bash
      run: |
        dotnet test -c Release --no-build

    - name: Run samples
      shell: bash
      run: |
        for dir in */; do
          if [ -d "$dir" ]; then
            # Extract directory name for the group title
            dirname=$(basename "$dir")
            
            echo "::group::Running project in $dirname"
            
            # Navigate into the directory and run the project
            # --project ensures it targets the specific file if multiple exist
            dotnet run --project "$dir" --no-build
            
            echo "::endgroup::"
          fi
        done

    - name: Pack NuGet package
      shell: bash
      run: |
        dotnet pack -c Release --no-build -o nupkgs

    - name: Upload NuGet package artifact
      uses: actions/upload-artifact@v7
      with:
        name: nuget-package
        path: nupkgs/*.nupkg
