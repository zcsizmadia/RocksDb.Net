name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET SDKs
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x

    - name: Build
      shell: bash
      run: |
        dotnet restore
        dotnet build -c Release --no-restore

    - name: Test
      shell: bash
      run: |
        dotnet test -c Release --no-build

    - name: Run samples
      shell: bash
      run: |
        for dir in Samples/*/; do
          if [ -d "$dir" ]; then
            pushd "$dir"
            echo "::group::Running $(basename "$dir") sample"
            dotnet run --no-build
            echo "::endgroup::"
            popd
          fi
        done

    - name: Pack NuGet package
      shell: bash
      run: |
        dotnet pack -c Release --no-build -o nupkgs

    - name: Upload NuGet package artifact
      uses: actions/upload-artifact@v7
      with:
        name: nuget-package
        path: nupkgs/*.nupkg
